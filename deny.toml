[graph]
targets = []

[licenses]
# Only allow OSI-approved permissive licenses compatible with Apache-2.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
]
deny = ["GPL-2.0", "GPL-3.0", "LGPL-2.0", "LGPL-2.1", "LGPL-3.0", "AGPL-3.0"]
# Copyleft licenses not allowed in Kainetic's permissive core.

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Deny multiple versions of the same crate (strict mode — relax per-entry if needed).
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

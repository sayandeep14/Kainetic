[graph]
targets = []
all-features = false

# ── Vulnerabilities ────────────────────────────────────────────────────────────

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
ignore = [
    # rustls-pemfile is unmaintained; the crate still works correctly.
    # Pulled in transitively by reqwest/rustls. No drop-in replacement available.
    { id = "RUSTSEC-2025-0134", reason = "transitive dep via reqwest/rustls; no upstream fix available" },

    # PyO3 0.24.x out-of-bounds read in BoundListIterator/BoundTupleIterator nth().
    # Fix requires pyo3 >= 0.29 which has breaking API changes.
    # Tracked for Part 14: upgrade kainetic-python to pyo3 0.29.
    { id = "RUSTSEC-2026-0176", reason = "pyo3 >= 0.29 required; bindings upgrade tracked for Part 14" },

    # PyO3 0.21–0.28 missing Sync on PyCFunction::new_closure.
    # Fix requires pyo3 >= 0.29 (same as above).
    { id = "RUSTSEC-2026-0177", reason = "pyo3 >= 0.29 required; bindings upgrade tracked for Part 14" },

    # fxhash is unmaintained; no upgrade available.
    # Pulled in transitively by scraper -> selectors -> fxhash.
    # Not a security vulnerability — only a maintenance concern.
    { id = "RUSTSEC-2025-0057", reason = "transitive dep via scraper/selectors; no upgrade available upstream" },

    # number_prefix is unmaintained; no upgrade available.
    # Pulled in transitively by indicatif.
    { id = "RUSTSEC-2025-0119", reason = "transitive dep via indicatif; no upgrade available upstream" },
]

# ── Licenses ───────────────────────────────────────────────────────────────────

[licenses]
version = 2
# Only allow OSI-approved permissive licenses compatible with Apache-2.0.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    # MPL-2.0: file-level weak copyleft (cssparser, selectors, scraper).
    # Compatible with Apache-2.0 projects per Mozilla's FAQ.
    "MPL-2.0",
    # CDLA-Permissive-2.0: permissive data license (webpki-roots).
    # No copyleft, no advertising clauses; safe for Apache-2.0 projects.
    "CDLA-Permissive-2.0",
]
# Licenses not in the `allow` list above are denied implicitly in cargo-deny v2.
# GPL, LGPL, and AGPL variants are not in the allow list and will be rejected.

[[licenses.clarify]]
name = "ring"
# ring uses a custom OpenSSL-derived license — acceptable for cryptography.
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ── Bans ──────────────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = [
    # thiserror 1.x / 2.x dual-presence: sqlx still pins 1.x, workspace uses 2.x.
    { name = "thiserror", reason = "thiserror 1.x/2.x dual-presence; sqlx has not yet upgraded" },
]

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
